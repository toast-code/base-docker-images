name: Publish Docker image

on:
  workflow_dispatch:
    inputs:
      image:
        description: Image folder to build
        type: choice
        required: true
        default: node24-chrome
        options:
          - node24-chrome
          - node14-npm7-chrome
      tag:
        description: Docker tag to publish. Leave empty to use the image folder name.
        type: string
        required: false
        default: ""
  push:
    branches:
      - master
    paths:
      - "node24-chrome/**"
      - ".github/workflows/publish-docker-image.yml"

jobs:
  publish:
    name: Publish ${{ github.event_name == 'workflow_dispatch' && inputs.image || 'node24-chrome' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMAGE_FOLDER: ${{ github.event_name == 'workflow_dispatch' && inputs.image || 'node24-chrome' }}
      TAG_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || '' }}
      DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE }}
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare image metadata
        id: image
        shell: bash
        run: |
          set -euo pipefail

          : "${DOCKERHUB_IMAGE:?Set repository variable DOCKERHUB_IMAGE}"
          : "${DOCKERHUB_USERNAME:?Set repository variable DOCKERHUB_USERNAME}"
          : "${DOCKERHUB_TOKEN:?Set repository secret DOCKERHUB_TOKEN}"

          case "${IMAGE_FOLDER}" in
            node24-chrome|node14-npm7-chrome) ;;
            *)
              echo "Unsupported image folder: ${IMAGE_FOLDER}" >&2
              exit 1
              ;;
          esac

          if [[ ! -f "${IMAGE_FOLDER}/Dockerfile" ]]; then
            echo "Missing Dockerfile: ${IMAGE_FOLDER}/Dockerfile" >&2
            exit 1
          fi

          tag="${TAG_INPUT:-${IMAGE_FOLDER}}"

          if [[ ! "${tag}" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "Invalid Docker tag: ${tag}" >&2
            exit 1
          fi

          image="docker.io/${DOCKERHUB_IMAGE}"
          sha_tag="${image}:${IMAGE_FOLDER}-sha-${GITHUB_SHA::12}"
          tags="${image}:${tag}"$'\n'"${sha_tag}"

          {
            echo "context=${IMAGE_FOLDER}"
            echo "image=${image}"
            echo "refreshed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ steps.image.outputs.context }}
          file: ${{ steps.image.outputs.context }}/Dockerfile
          platforms: linux/amd64
          push: true
          pull: true
          provenance: false
          tags: ${{ steps.image.outputs.tags }}
          build-args: |
            REFRESHED_AT=${{ steps.image.outputs.refreshed_at }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.image.outputs.refreshed_at }}
